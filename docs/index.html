  <body>
    <canvas id="receipt-canvas" aria-hidden="true"></canvas>
    <main class="stage" aria-labelledby="title">
      <div class="printer-assembly">

              <p class="line line-spread">

            <hr class="rule rule-dotted" />

            <section class="block">

                <span>VIEWS</span>

            <hr class="rule rule-dotted" />

            <section class="block block-actions">
              <a class="btn btn-primary" href="scroll-receipt-2.0.0-chrome.zip" download>
                DOWNLOAD
              </a>
            </section>

            <hr class="rule rule-dotted" />

            <footer class="receipt-foot">
              <p class="line line-spread">
                <span>PAID WITH</span>
                <span>YOUR ATTENTION</span>
              </p>
              <p class="fine">
                <a href="about.html">About</a> ·
                <a href="install.html">Install</a> ·
                <a href="faq.html">FAQ</a> ·

            <div class="receipt-edge receipt-edge-bottom" aria-hidden="true"></div>
          </article>
          </div>
        </div>

        <div class="printer-chassis" aria-hidden="true">
          <div class="printer-mouth">
            <span class="printer-led"></span>
          </div>
          <div class="printer-base"></div>
        </div>
      </div>
