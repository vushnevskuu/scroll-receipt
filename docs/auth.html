<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Email Sign-In — Scroll Receipt</title>
    <meta
      name="description"
      content="Finish Scroll Receipt email sign-in and connect the receipt extension."
    />
    <link rel="canonical" href="https://scroll.outthere.day/auth.html" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="stage stage-static" aria-labelledby="auth-title">
      <article class="receipt">
        <div class="receipt-edge receipt-edge-top" aria-hidden="true"></div>

        <header class="receipt-head">
          <p class="receipt-meta">AUTH RECEIPT</p>
          <h1 id="auth-title">EMAIL SIGN-IN</h1>
          <p class="receipt-sub">SCROLL RECEIPT</p>
        </header>

        <hr class="rule rule-dotted" />

        <section class="block">
          <p class="line line-spread">
            <span>STATUS</span>
            <span id="auth-status">CONNECTING</span>
          </p>
          <p id="auth-message" class="receipt-tagline">
            Verifying your email link and connecting it to the extension.
          </p>
        </section>

        <hr class="rule rule-dotted" />

        <section class="block block-actions">
          <a class="btn btn-primary" id="auth-return" href="./">Return to homepage</a>
          <a class="btn btn-ghost" href="install.html">Install guide</a>
        </section>

        <div class="receipt-edge receipt-edge-bottom" aria-hidden="true"></div>
      </article>
    </main>
    <script type="module" src="auth.js"></script>
  </body>
</html>
